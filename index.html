<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片混淆工具</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .cf-turnstile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fafafa;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
        }
        
        .main-content.hidden {
            display: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #78350f;
            font-size: 2rem;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .description {
            text-align: center;
            color: #92400e;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .status-bar {
            text-align: center;
            color: #b45309;
            font-size: 0.9rem;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .button-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .button-wrapper:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .button-wrapper:active {
            transform: translateY(0);
        }

        .button-wrapper:disabled,
        .normal_button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .normal_button {
            min-width: 110px;
            height: 44px;
            line-height: 44px;
            font-size: 0.95rem;
            padding: 0 20px;
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
            z-index: 1;
        }

        .btn-select {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
        }

        .btn-encrypt {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #fff;
        }

        .btn-decrypt {
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            color: #fff;
        }

        .btn-restore {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: #fff;
        }

        .btn-download {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
        }

        .btn-clear {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: #fff;
        }

        .settings-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #fef3c7;
            border-radius: 12px;
            border: 2px solid #fbbf24;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-label {
            color: #78350f;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .setting-input {
            width: 80px;
            height: 40px;
            padding: 0 12px;
            border: 2px solid #fbbf24;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            color: #78350f;
            background: #fff;
            transition: all 0.2s ease;
        }

        .setting-input:focus {
            outline: none;
            border-color: #d97706;
            box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.2);
        }

        .ipt_btn {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            padding: 20px;
            background: #fef3c7;
            border-radius: 15px;
            border: 2px dashed #fbbf24;
            min-height: 200px;
            transition: all 0.3s ease;
        }

        .images-grid.has-images {
            background: #fef9c3;
            border: 2px solid #fbbf24;
        }

        .image-card {
            position: relative;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: cardFadeIn 0.4s ease-out;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .image-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        .image-card-info {
            padding: 10px;
            font-size: 0.8rem;
            color: #78350f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .image-card-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .placeholder {
            grid-column: 1 / -1;
            color: #92400e;
            font-size: 1rem;
            text-align: center;
            align-self: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #fef3c7;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .settings-container {
                flex-direction: column;
                gap: 12px;
            }

            .normal_button {
                min-width: 90px;
                padding: 0 15px;
                font-size: 0.85rem;
            }

            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }

            .image-card img {
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div id="cf-turnstile-wrapper" class="cf-turnstile-container">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADIqAuHMoQzLsZOVarVcqa9qJ-4" data-callback="onTurnstileSuccess"></div>
    </div>
    
    <div class="main-content hidden">
        <div class="container">
            <h1>🎨 图片混淆工具</h1>
        <p class="description">基于空间填充曲线的新一代图片混淆。混淆算法保持像素的空间相关性，混淆图被压缩仍能保持色彩。仅供技术交流使用。</p>
        <div class="status-bar" id="status-bar"></div>
        
        <div class="settings-container">
            <div class="setting-item">
                <label class="setting-label">混淆次数：</label>
                <input type="number" id="encryptCount" class="setting-input" min="1" max="100" value="1">
            </div>
            <div class="setting-item">
                <label class="setting-label">解混淆次数：</label>
                <input type="number" id="decryptCount" class="setting-input" min="1" max="100" value="1">
            </div>
        </div>
        
        <div class="buttons-container">
            <div class="button-wrapper">
                <button class="normal_button btn-select">选择图片</button>
                <input type="file" accept="image/*" id="ipt" class="ipt_btn" multiple />
            </div>
            <div class="button-wrapper">
                <button id="enc" class="normal_button btn-encrypt" disabled>一键混淆</button>
            </div>
            <div class="button-wrapper">
                <button id="dec" class="normal_button btn-decrypt" disabled>一键解混淆</button>
            </div>
            <div class="button-wrapper">
                <button id="re" class="normal_button btn-restore" disabled>批量还原</button>
            </div>
            <div class="button-wrapper">
                <button id="download" class="normal_button btn-download" disabled>批量下载</button>
            </div>
            <div class="button-wrapper">
                <button id="clear" class="normal_button btn-clear" disabled>清空</button>
            </div>
        </div>
        
        <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        <div class="images-grid" id="images-grid">
            <p class="placeholder" id="placeholder">点击「选择图片」按钮开始，支持多选</p>
        </div>
    </div>

    <script>
        function gilbert2d(width, height) {
            const coordinates = [];
            if (width >= height) {
                generate2d(0, 0, width, 0, 0, height, coordinates);
            } else {
                generate2d(0, 0, 0, height, width, 0, coordinates);
            }
            return coordinates;
        }

        function generate2d(x, y, ax, ay, bx, by, coordinates) {
            const w = Math.abs(ax + ay);
            const h = Math.abs(bx + by);
            const dax = Math.sign(ax), day = Math.sign(ay);
            const dbx = Math.sign(bx), dby = Math.sign(by);

            if (h === 1) {
                for (let i = 0; i < w; i++) {
                    coordinates.push([x, y]);
                    x += dax;
                    y += day;
                }
                return;
            }

            if (w === 1) {
                for (let i = 0; i < h; i++) {
                    coordinates.push([x, y]);
                    x += dbx;
                    y += dby;
                }
                return;
            }

            let ax2 = Math.floor(ax / 2), ay2 = Math.floor(ay / 2);
            let bx2 = Math.floor(bx / 2), by2 = Math.floor(by / 2);
            const w2 = Math.abs(ax2 + ay2);
            const h2 = Math.abs(bx2 + by2);

            if (2 * w > 3 * h) {
                if ((w2 % 2) && (w > 2)) {
                    ax2 += dax;
                    ay2 += day;
                }
                generate2d(x, y, ax2, ay2, bx, by, coordinates);
                generate2d(x + ax2, y + ay2, ax - ax2, ay - ay2, bx, by, coordinates);
            } else {
                if ((h2 % 2) && (h > 2)) {
                    bx2 += dbx;
                    by2 += dby;
                }
                generate2d(x, y, bx2, by2, ax2, ay2, coordinates);
                generate2d(x + bx2, y + by2, ax, ay, bx - bx2, by - by2, coordinates);
                generate2d(x + (ax - dax) + (bx2 - dbx), y + (ay - day) + (by2 - dby),
                    -bx2, -by2, -(ax - ax2), -(ay - ay2), coordinates);
            }
        }
    </script>

    <script>
        // Cloudflare Turnstile验证成功回调
        function onTurnstileSuccess(token) {
            document.getElementById('cf-turnstile-wrapper').style.display = 'none';
            document.querySelector('.main-content').classList.remove('hidden');
        }

        let images = [];
        const imagesGrid = document.getElementById('images-grid');
        const placeholder = document.getElementById('placeholder');
        const statusBar = document.getElementById('status-bar');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        const ipt = document.getElementById('ipt');
        
        const btnEnc = document.getElementById('enc');
        const btnDec = document.getElementById('dec');
        const btnRe = document.getElementById('re');
        const btnDownload = document.getElementById('download');
        const btnClear = document.getElementById('clear');
        const encryptCountInput = document.getElementById('encryptCount');
        const decryptCountInput = document.getElementById('decryptCount');

        function updateButtons() {
            const hasImages = images.length > 0;
            btnEnc.disabled = !hasImages;
            btnDec.disabled = !hasImages;
            btnRe.disabled = !hasImages;
            btnDownload.disabled = !hasImages;
            btnClear.disabled = !hasImages;
        }

        function updateStatus() {
            if (images.length === 0) {
                statusBar.textContent = '';
            } else {
                const processedCount = images.filter(img => img.processed).length;
                statusBar.textContent = `已加载 ${images.length} 张图片，已处理 ${processedCount} 张`;
            }
        }

        function updateProgress(percent) {
            progressFill.style.width = `${percent}%`;
        }

        function createImageCard(imageData, index) {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.id = `card-${index}`;
            
            const img = document.createElement('img');
            img.src = imageData.currentUrl;
            img.id = `img-${index}`;
            
            const badge = document.createElement('div');
            badge.className = 'image-card-badge';
            badge.id = `badge-${index}`;
            badge.textContent = imageData.processed ? '已处理' : '原图';
            
            const info = document.createElement('div');
            info.className = 'image-card-info';
            info.textContent = imageData.name;
            
            card.appendChild(img);
            card.appendChild(badge);
            card.appendChild(info);
            
            return card;
        }

        function renderImages() {
            imagesGrid.innerHTML = '';
            
            if (images.length === 0) {
                imagesGrid.appendChild(placeholder);
                placeholder.style.display = 'block';
                imagesGrid.classList.remove('has-images');
            } else {
                placeholder.style.display = 'none';
                imagesGrid.classList.add('has-images');
                images.forEach((imageData, index) => {
                    const card = createImageCard(imageData, index);
                    imagesGrid.appendChild(card);
                });
            }
            
            updateButtons();
            updateStatus();
        }

        function updateImageCard(index, imageData) {
            const img = document.getElementById(`img-${index}`);
            const badge = document.getElementById(`badge-${index}`);
            
            if (img && badge) {
                img.src = imageData.currentUrl;
                badge.textContent = imageData.processed ? '已处理' : '原图';
            }
        }

        function processImage(imageData, mode) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    const width = cvs.width = img.width;
                    const height = cvs.height = img.height;
                    const ctx = cvs.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imgdata = ctx.getImageData(0, 0, width, height);
                    const imgdata2 = new ImageData(width, height);
                    const curve = gilbert2d(width, height);
                    const offset = Math.round((Math.sqrt(5) - 1) / 2 * width * height);
                    
                    for(let i = 0; i < width * height; i++) {
                        const old_pos = curve[i];
                        const new_pos = curve[(i + offset) % (width * height)];
                        const old_p = 4 * (old_pos[0] + old_pos[1] * width);
                        const new_p = 4 * (new_pos[0] + new_pos[1] * width);
                        
                        if (mode === 'encrypt') {
                            imgdata2.data.set(imgdata.data.slice(old_p, old_p + 4), new_p);
                        } else {
                            imgdata2.data.set(imgdata.data.slice(new_p, new_p + 4), old_p);
                        }
                    }
                    
                    ctx.putImageData(imgdata2, 0, 0);
                    cvs.toBlob((blob) => {
                        const newUrl = URL.createObjectURL(blob);
                        URL.revokeObjectURL(imageData.currentUrl);
                        imageData.currentUrl = newUrl;
                        imageData.processed = true;
                        imageData.blob = blob;
                        resolve(imageData);
                    }, 'image/jpeg', 1);
                };
                img.src = imageData.currentUrl;
            });
        }

        async function batchProcess(mode) {
            progressBar.classList.add('show');
            updateProgress(0);
            
            let count = 1;
            if (mode === 'encrypt') {
                count = Math.max(1, Math.min(100, parseInt(encryptCountInput.value) || 1));
            } else if (mode === 'decrypt') {
                count = Math.max(1, Math.min(100, parseInt(decryptCountInput.value) || 1));
            }
            
            const totalSteps = mode === 'restore' ? images.length : images.length * count;
            let currentStep = 0;
            
            for (let i = 0; i < images.length; i++) {
                if (mode === 'restore') {
                    URL.revokeObjectURL(images[i].currentUrl);
                    images[i].currentUrl = images[i].originalUrl;
                    images[i].processed = false;
                    images[i].blob = null;
                    currentStep++;
                    updateProgress((currentStep / totalSteps) * 100);
                } else {
                    for (let j = 0; j < count; j++) {
                        images[i] = await processImage(images[i], mode);
                        currentStep++;
                        updateProgress((currentStep / totalSteps) * 100);
                    }
                }
                updateImageCard(i, images[i]);
            }
            
            setTimeout(() => {
                progressBar.classList.remove('show');
                updateProgress(0);
            }, 500);
            
            updateStatus();
        }

        function downloadImage(blob, filename) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        async function batchDownload() {
            progressBar.classList.add('show');
            updateProgress(0);
            
            for (let i = 0; i < images.length; i++) {
                const imageData = images[i];
                const filename = imageData.processed 
                    ? `${imageData.name.replace(/\.[^/.]+$/, '')}_processed.jpg`
                    : imageData.name;
                
                if (imageData.blob) {
                    downloadImage(imageData.blob, filename);
                } else {
                    const response = await fetch(imageData.currentUrl);
                    const blob = await response.blob();
                    downloadImage(blob, filename);
                }
                
                updateProgress(((i + 1) / images.length) * 100);
                await new Promise(r => setTimeout(r, 100));
            }
            
            setTimeout(() => {
                progressBar.classList.remove('show');
                updateProgress(0);
            }, 500);
        }

        function clearAll() {
            images.forEach(img => {
                URL.revokeObjectURL(img.originalUrl);
                if (img.currentUrl !== img.originalUrl) {
                    URL.revokeObjectURL(img.currentUrl);
                }
            });
            images = [];
            renderImages();
        }

        ipt.onchange = async (e) => {
            if (e.target.files.length > 0) {
                for (const file of e.target.files) {
                    const url = URL.createObjectURL(file);
                    images.push({
                        name: file.name,
                        originalUrl: url,
                        currentUrl: url,
                        processed: false,
                        blob: null
                    });
                }
                renderImages();
            }
        };

        function validateInput(input) {
            let value = parseInt(input.value);
            if (isNaN(value) || value < 1) {
                value = 1;
            } else if (value > 100) {
                value = 100;
            }
            input.value = value;
        }

        encryptCountInput.addEventListener('change', () => validateInput(encryptCountInput));
        decryptCountInput.addEventListener('change', () => validateInput(decryptCountInput));
        encryptCountInput.addEventListener('input', () => validateInput(encryptCountInput));
        decryptCountInput.addEventListener('input', () => validateInput(decryptCountInput));

        btnEnc.onclick = () => batchProcess('encrypt');
        btnDec.onclick = () => batchProcess('decrypt');
        btnRe.onclick = () => batchProcess('restore');
        btnDownload.onclick = batchDownload;
        btnClear.onclick = clearAll;
    </script>
    </div>
</body>
</html>
